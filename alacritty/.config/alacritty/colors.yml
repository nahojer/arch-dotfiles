schemes:
  # VSCode themes.
  codelight: &vscode_light
    primary:
      background: "#ffffff"
      foreground: "#1e1e1e"
    cursor:
      text: "#d4d4d4"
      cursor: "#d4d4d4"
    normal:
      black: "#1e1e1e"
      red: "#c72e0f"
      green: "#009000"
      yellow: "#795e25"
      blue: "#007acc"
      magenta: "#af00db"
      cyan: "#56b6c2"
      white: "#d4d4d4"
    bright:
      black: "#1e1e1e"
      red: "#c72e0f"
      green: "#009000"
      yellow: "#795e25"
      blue: "#007acc"
      magenta: "#af00db"
      cyan: "#56b6c2"
      white: "#d4d4d4"

  codedark: &vscode_dark
    primary:
      background: "#1e1e1e"
      foreground: "#d4d4d4"
    cursor:
      text: "#d4d4d4"
      cursor: "#d4d4d4"
    normal:
      black: "#1e1e1e"
      red: "#f44747"
      green: "#608b4e"
      yellow: "#dcdcaa"
      blue: "#569cd6"
      magenta: "#c678dd"
      cyan: "#56b6c2"
      white: "#d4d4d4"
    bright:
      black: "#545454"
      red: "#f44747"
      green: "#608b4e"
      yellow: "#dcdcaa"
      blue: "#569cd6"
      magenta: "#c678dd"
      cyan: "#56b6c2"
      white: "#d4d4d4"

  carbonfox: &carbonfox
    primary:
      background: '0x161616'
      foreground: '0xf2f4f8'
    # Normal colors
    normal:
      black:   '0x282828'
      red:     '0xee5396'
      green:   '0x25be6a'
      yellow:  '0x08bdba'
      blue:    '0x78a9ff'
      magenta: '0xbe95ff'
      cyan:    '0x33b1ff'
      white:   '0xdfdfe0'
    # Bright colors
    bright:
      black:   '0x484848'
      red:     '0xf16da6'
      green:   '0x46c880'
      yellow:  '0x2dc7c4'
      blue:    '0x8cb6ff'
      magenta: '0xc8a5ff'
      cyan:    '0x52bdff'
      white:   '0xe4e4e5'
    indexed_colors:
      - { index: 16, color: '0x3ddbd9' }
      - { index: 17, color: '0xff7eb6' }

colors: *carbonfox
