include-file = ~/.config/polybar/themes/chnvok/include-modules.ini

[bar/main]
monitor = ${env:MONITOR}
width = 100%
height = 30
line-size = 2
offset-y = 0
bottom = true
fixed-center = true

scroll-up = next
scroll-down = prev

enable-ipc = true

background = ${colors.bg}
foreground = ${colors.fg}

include-file = ~/.config/polybar/fonts.ini
include-file = ~/.config/polybar/modules.ini

tray-background = ${colors.bg}
tray-position = right
tray-maxsize = 16

cursor-click = pointer
cursor-scroll = 

[settings]
screenchange-reload = true
