;   To learn more about how to configure Polybar
;   go to https://github.com/polybar/polybar

include-file = ~/.config/polybar/themes/nord/include-modules.ini

[bar/main]
monitor = ${env:MONITOR}
width = 100%
height = 30
line-size = 2
offset-y = 0
bottom = false
fixed-center = true

scroll-up = next
scroll-down = prev

enable-ipc = true

background = ${colors.bg}
foreground = ${colors.fg}

include-file = ~/.config/polybar/fonts.ini
include-file = ~/.config/polybar/modules.ini

tray-background = ${colors.bg}
tray-position = right
tray-maxsize = 16

cursor-click = pointer
cursor-scroll = 

[bar/extra]
monitor = ${env:MONITOR}
width = 100%
height = 30
line-size = 2
offset-y = 0
bottom = true
fixed-center = true

scroll-up = next
scroll-down = prev

enable-ipc = true

background = ${colors.bg}
foreground = ${colors.fg}

include-file = ~/.config/polybar/fonts.ini
include-file = ~/.config/polybar/modules-extra.ini

tray-background = ${colors.bg}
tray-position = right
tray-maxsize = 16

cursor-click = pointer
cursor-scroll =

[settings]
screenchange-reload = true
