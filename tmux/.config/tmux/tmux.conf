# Remap prefix from 'C-b' to 'C-a'.
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Start index of window/pane with 1, because we're humans, not computers.
set -g base-index 1
setw -g pane-base-index 1

# Reload.
bind r source-file ~/.config/tmux/tmux.conf

# Vim-like pane resizing.
bind -r C-k resize-pane -U
bind -r C-j resize-pane -D
bind -r C-h resize-pane -L
bind -r C-l resize-pane -R

# Vim-like splits and windows.
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key v split-window -h
bind-key s split-window -v # Address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 10

# Increase scrollback buffer size from 2000 to 50000 lines
set -g history-limit 50000

# Increase tmux messages display duration from 750ms to 4s
set -g display-time 4000

# Refresh 'status-left' and 'status-right' more often, from every 15s to 5s
set -g status-interval 5

# Place status bar at the bottom
set-option -g status-position bottom

# Focus events enabled for terminals that support them
set -g focus-events on

# Super useful when using "grouped sessions" and multi-monitor setup
setw -g aggressive-resize on

# Vi copy mode.
bind-key -n 'c-M-c' copy-mode # CTRL+ALT+c
setw -g mode-keys vi
bind P paste-buffer
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -sel clip -i'  # Also copy to system clipboard

# Disable mouse support. No need with vi copy mode.
set -g mouse off

# Unbind arrows.
unbind Up
unbind Down
unbind Left
unbind Right
unbind C-Up
unbind C-Down
unbind C-Left

# Undercurl
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0
set-option -sa terminal-overrides ',alacritty:RGB' # tmux shouldn't override any colors...

# Status bar
set-option -g status "on"
set-option -g status-style bg=colour237,fg=colour223 # bg=bg1, fg=fg1, default statusbar color
set-window-option -g window-status-style bg=colour214,fg=colour237 # bg=yellow, fg=bg1, default window title colors
set-window-option -g window-status-activity-style bg=colour237,fg=colour248 # bg=bg1, fg=fg3, default window with an activity alert
set-window-option -g window-status-current-style bg=red,fg=colour237 # fg=bg1, activate window title colors
set-option -g display-panes-active-colour colour250 #fg2, pane number display
set-option -g display-panes-colour colour237 #bg1, pane number display
set-option -g status-left "#[bg=colour241,fg=colour248] #S #[bg=colour237,fg=colour241,nobold,noitalics,nounderscore]"
set-option -g status-right ""
set-window-option -g window-status-current-format "#[bg=gray,fg=colour237,nobold,noitalics,nounderscore]#[bg=gray,fg=colour239] *#I#[bg=gray,fg=colour239,bold] #W#{?window_zoomed_flag,*Z,} "
set-window-option -g window-status-format "#[bg=gray,fg=colour237,nobold,noitalics,nounderscore]#[bg=gray,fg=colour239] #I#[bg=gray,fg=colour239,bold] #W#{?window_zoomed_flag,*Z,} "

# List of plugins
set -g @plugin 'tmux-plugins/tpm'

# setenv -g TMUX_PLUGIN_MANAGER_PATH "~/.config/tmux/plugins/"
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.local/share/tmux/plugins'
if "test ! -d ~/.local/share/tmux/plugins/tpm" "run 'git clone https://github.com/tmux-plugins/tpm ~/.local/share/tmux/plugins/tpm && ~/.local/share/tmux/plugins/tpm/bin/install_plugins'"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.local/share/tmux/plugins/tpm/tpm'
